function indHtml(cls){
  if(cls === 'ind-final'){
    return '<span class="ind ind-final">✓</span>';
  }

  if(cls === 'ind-off' || cls === 'ind-out'){
    return `
      <svg class="ind-svg" viewBox="0 0 10 10" aria-hidden="true">
        <circle cx="5" cy="5" r="4" fill="#3a0000" stroke="#0a0000" stroke-width="1.5"></circle>
      </svg>
    `;
  }

  return '<span class="ind '+cls+'"></span>';
}
