<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Séries">
<meta name="theme-color" content="#0f1923">
<title>Pool Séries 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1923;color:#e8eaed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.header{background:#1a2535;margin:12px 12px 0;border-radius:12px;padding:14px;border-bottom:2px solid #22c55e}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.header-title{font-size:19px;font-weight:600;color:#e8eaed}
.header-title span{color:#22c55e}
.header-date{font-size:11px;color:#8a9bb0;background:#0f1923;padding:4px 10px;border-radius:20px;border:.5px solid #2a3a4a}
.header-sub{font-size:12px;color:#8a9bb0;margin-top:6px;padding-left:34px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px}
.section-label{font-size:11px;color:#8a9bb0;padding:12px 16px 6px;text-transform:uppercase;letter-spacing:.5px}
.matchup-card{background:#1a2535;margin:0 12px 8px;border-radius:12px;border:.5px solid #2a3a4a;padding:12px 14px;cursor:pointer}
.matchup-card:active{background:#202f40}
.matchup-num{font-size:10px;color:#8a9bb0;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.matchup-row{display:flex;align-items:center}
.team-side{flex:1}
.team-name{font-size:15px;font-weight:500}
.team-pts{font-size:13px;margin-top:2px}
.team-pts.leading{color:#22c55e;font-weight:500}
.team-pts.trailing{color:#ef4444}
.vs-block{text-align:center;padding:0 10px}
.vs-text{font-size:11px;color:#8a9bb0}
.score-gap{font-size:13px;font-weight:500;margin-top:2px}
.score-gap.pos{color:#22c55e}
.score-gap.neg{color:#ef4444}
.score-gap.tied{color:#f59e0b}
.right-side{text-align:right}
.status-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.status-pill{font-size:10px;padding:2px 7px;border-radius:20px}
.pill-live{background:#14532d;color:#86efac}
.pill-pre{background:#451a03;color:#fcd34d}
.pill-final{background:#1e293b;color:#94a3b8}
.refresh-btn{text-align:center;padding:8px;color:#8a9bb0;font-size:11px;cursor:pointer;margin-bottom:20px}
.detail-view{display:none}
.back-btn{font-size:12px;color:#22c55e;padding:10px 16px;cursor:pointer}
.detail-card{background:#1a2535;margin:0 12px 20px;border-radius:12px;overflow:hidden;border:.5px solid #2a3a4a}
.matchup-title-bar{background:#2a3a4a;text-align:center;font-size:11px;color:#e8eaed;font-weight:500;padding:6px;letter-spacing:.5px}
.owners-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch}
.own-l{background:#1e3a5f;padding:10px 12px}
.own-l-name{font-size:15px;font-weight:600;color:#e8eaed}
.own-l-pts{font-size:11px;color:#93c5fd;margin-top:2px}
.own-r{background:#1a4a2e;padding:10px 12px;text-align:right}
.own-r-name{font-size:15px;font-weight:600;color:#e8eaed}
.own-r-pts{font-size:11px;color:#86efac;margin-top:2px}
.vs-mid{background:#0d1f2e;padding:10px 8px;font-size:11px;color:#8a9bb0;display:flex;align-items:center;justify-content:center}
.section-bar{background:#0d1f2e;text-align:center;font-size:9px;color:#8a9bb0;padding:4px;text-transform:uppercase;letter-spacing:.5px}
.player-row{display:grid;grid-template-columns:10px 1fr 26px 10px 26px 1fr 10px;gap:3px;align-items:center;padding:4px 8px;border-bottom:.5px solid #0f1923}
.ind{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ind-live{background:#22c55e}
.ind-pre{background:#f59e0b}
.ind-final{background:#374151}
.ind-off{background:#222e3d}
.ind-out{background:#ef4444}
.pname{font-size:11px;color:#e8eaed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pname-r{font-size:11px;color:#e8eaed;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ppts-l{font-size:11px;color:#8a9bb0;text-align:right}
.ppts-r{font-size:11px;color:#8a9bb0}
.ppts-l.scored{color:#22c55e;font-weight:500}
.ppts-r.scored{color:#22c55e;font-weight:500}
.divider-col{width:1px;background:#2a3a4a;height:14px;margin:0 auto}
.points-bar{display:grid;grid-template-columns:1fr 1fr;border-top:.5px solid #0f1923}
.pts-l{background:#1e3a5f;padding:6px 12px;font-size:11px;color:#8a9bb0;border-right:2px solid #0f1923}
.pts-l span{font-size:16px;font-weight:500;color:#e8eaed;display:block}
.pts-r{background:#1a4a2e;padding:6px 12px;font-size:11px;color:#8a9bb0;text-align:right}
.pts-r span{font-size:16px;font-weight:500;color:#22c55e;display:block}
.pred-wrap{background:#0d1f2e;border-left:2px solid #22c55e}
.pred-title{font-size:9px;color:#22c55e;padding:5px 10px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.pred-row{display:grid;grid-template-columns:1fr 1fr;padding:4px 10px;border-top:.5px solid #1a2535}
.pred-l{font-size:11px;color:#cbd5e1}
.pred-r{font-size:11px;color:#cbd5e1;text-align:right}
.pred-pts-bar{display:grid;grid-template-columns:1fr 1fr;border-top:.5px solid #2a3a4a}
.pred-pts-l{background:#1e3a5f;padding:5px 12px;font-size:11px;color:#8a9bb0;border-right:2px solid #0f1923}
.pred-pts-l span{font-size:15px;font-weight:500;color:#e8eaed;display:block}
.pred-pts-r{background:#1a4a2e;padding:5px 12px;font-size:11px;color:#8a9bb0;text-align:right}
.pred-pts-r span{font-size:15px;font-weight:500;color:#22c55e;display:block}
.total-bar{display:grid;grid-template-columns:1fr 1fr;border-top:.5px solid #2a3a4a}
.total-l{background:#1e2a3a;padding:7px 12px;font-size:11px;color:#8a9bb0;border-right:2px solid #0f1923}
.total-l span{font-size:18px;font-weight:600;color:#e8eaed;display:block}
.total-r{background:#14532d;padding:7px 12px;font-size:11px;color:#86efac;text-align:right}
.total-r span{font-size:18px;font-weight:600;color:#22c55e;display:block}
.loading{text-align:center;padding:40px 20px;color:#8a9bb0;font-size:14px}
.ld{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin:0 3px;animation:b 1.2s infinite}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes b{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
</head>
<body>

<div id="home-view">
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <svg width="30" height="30" viewBox="0 0 38 38">
          <rect x="3" y="9" width="32" height="20" rx="9" fill="#0d2035" stroke="#22c55e" stroke-width="1.5"/>
          <line x1="19" y1="9" x2="19" y2="29" stroke="#22c55e" stroke-width="0.8" opacity="0.5"/>
          <circle cx="19" cy="19" r="5" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.5"/>
          <circle cx="19" cy="19" r="1.5" fill="#22c55e"/>
        </svg>
        <div class="header-title">Pool <span>Séries</span> 2026</div>
      </div>
      <div class="header-date" id="header-date">Ronde 1</div>
    </div>
    <div class="header-sub" id="header-sub"><span class="live-dot"></span>Chargement...</div>
  </div>
  <div class="section-label">Matchups — Ronde 1</div>
  <div id="matchups-container">
    <div class="loading"><div><span class="ld"></span><span class="ld"></span><span class="ld"></span></div><div style="margin-top:12px">Chargement...</div></div>
  </div>
  <div class="refresh-btn" onclick="loadData()">↻ Actualiser</div>
</div>

<div id="detail-view" class="detail-view">
  <div class="back-btn" onclick="showHome()">← Matchups</div>
  <div id="detail-container"></div>
</div>

<script>
const SHEET_ID = '1MaI1PwHvwcKqP316Y-7raHWmmAzVVvMY-dobjAp19jE';

// Column indices (0-based) matching App_Live headers:
// A=User, B=Matchup, C=Round, D=Position, E=Player,
// F=LiveG, G=LiveA, H=SeasonG, I=SeasonA, J=TotalPoints,
// K=Indicator, L=UserTotal, M=OpponentTotal, N=LeadIndicator, O=Opponent
const C = {
  User:0, Matchup:1, Round:2, Position:3, Player:4,
  LiveG:5, LiveA:6, SeasonG:7, SeasonA:8, TotalPoints:9,
  Indicator:10, UserTotal:11, OpponentTotal:12, LeadIndicator:13, Opponent:14
};

// Predictions from App_Ronde1
// Matchup, LeftOwner, RightOwner, LeftTotal, RightTotal,
// Position, LeftPlayer, LeftPts, LeftInd, RightPlayer, RightPts, RightInd,
// PredLeft, PredRight, PredPtsLeft, PredPtsRight, Type
const P = {
  Matchup:0, LeftOwner:1, RightOwner:2, LeftTotal:3, RightTotal:4,
  PredLeft:12, PredRight:13, PredPtsLeft:14, PredPtsRight:15, Type:16
};

const MATCHUPS = [
  {num:1,left:'Francis',   right:'Laurent'},
  {num:2,left:'Jo',        right:'Jose'},
  {num:3,left:'J-P',       right:'Éric'},
  {num:4,left:'Yan',       right:'Lionel'},
  {num:5,left:'Yvon',      right:'Joaquin'},
  {num:6,left:'Guillaume', right:'Simon'},
  {num:7,left:'David',     right:'Mario'},
  {num:8,left:'Marc-André',right:'Dom'}
];

let liveRows = [];
let predRows = [];

function indClass(v) {
  if (!v) return 'ind-off';
  const s = v.toString();
  if (s.includes('🟢')) return 'ind-live';
  if (s.includes('🟡')) return 'ind-pre';
  if (s.includes('✅')) return 'ind-final';
  if (s.includes('⛔')) return 'ind-out';
  return 'ind-off';
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows.map(r => r.c.map(c => c ? (c.f !== undefined && c.f !== null ? c.f : c.v) : ''));
}

async function loadData() {
  try {
    [liveRows, predRows] = await Promise.all([
      fetchSheet('App_Live'),
      fetchSheet('App_Ronde1')
    ]);
    renderHome();
  } catch(e) {
    document.getElementById('matchups-container').innerHTML = '<div class="loading">Erreur de chargement.</div>';
  }
}

function getPlayers(matchupNum, user) {
  return liveRows.filter(r => Number(r[C.Matchup]) === matchupNum && r[C.User] === user);
}

function getPreds(matchupNum) {
  return predRows.filter(r => Number(r[P.Matchup]) === matchupNum && r[P.Type] === 'prediction');
}

function renderHome() {
  const now = new Date();
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('fr-CA',{day:'numeric',month:'short'}) + ' · Ronde 1';

  let liveC=0, preC=0;
  liveRows.forEach(r => {
    const ic = indClass(r[C.Indicator]);
    if(ic==='ind-live') liveC++;
    else if(ic==='ind-pre') preC++;
  });

  document.getElementById('header-sub').innerHTML = liveC > 0
    ? `<span class="live-dot"></span>${liveC} joueur${liveC>1?'s':''} en direct`
    : preC > 0
    ? `<span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;margin-right:5px;"></span>${preC} à venir`
    : 'Aucun match en cours';

  let html = '';
  MATCHUPS.forEach(mu => {
    const lPlayers = getPlayers(mu.num, mu.left);
    const rPlayers = getPlayers(mu.num, mu.right);
    const leftTotal  = lPlayers.length ? Number(lPlayers[0][C.UserTotal] || 0) : 0;
    const rightTotal = rPlayers.length ? Number(rPlayers[0][C.UserTotal] || 0) : 0;
    const gap = Math.abs(leftTotal - rightTotal);
    const tied = leftTotal === rightTotal;
    const leftLeading  = leftTotal > rightTotal;
    const rightLeading = rightTotal > leftTotal;
    const gapClass = tied?'tied':leftLeading?'pos':'neg';
    const gapText  = tied?'Égalité':(leftLeading?'+':'-')+gap;

    let liveP=0,preP=0,finalP=0;
    [...lPlayers,...rPlayers].forEach(r => {
      const ic = indClass(r[C.Indicator]);
      if(ic==='ind-live') liveP++;
      else if(ic==='ind-pre') preP++;
      else if(ic==='ind-final') finalP++;
    });

    let pills='';
    if(liveP)  pills+=`<span class="status-pill pill-live">${liveP} LIVE</span>`;
    if(preP)   pills+=`<span class="status-pill pill-pre">${preP} PRE</span>`;
    if(finalP) pills+=`<span class="status-pill pill-final">${finalP} FINAL</span>`;

    html+=`
    <div class="matchup-card" onclick="showDetail(${mu.num})">
      <div class="matchup-num">Matchup ${mu.num}</div>
      <div class="matchup-row">
        <div class="team-side">
          <div class="team-name">${leftLeading?'🔥 ':''}${mu.left}</div>
          <div class="team-pts ${leftLeading?'leading':'trailing'}">${leftTotal} pts</div>
        </div>
        <div class="vs-block">
          <div class="vs-text">VS</div>
          <div class="score-gap ${gapClass}">${gapText}</div>
        </div>
        <div class="team-side right-side">
          <div class="team-name">${mu.right}${rightLeading?' 🔥':''}</div>
          <div class="team-pts ${rightLeading?'leading':'trailing'}">${rightTotal} pts</div>
        </div>
      </div>
      ${pills?`<div class="status-bar">${pills}</div>`:''}
    </div>`;
  });

  document.getElementById('matchups-container').innerHTML = html || '<div class="loading">Aucune donnée.</div>';
}

function showDetail(num) {
  const mu = MATCHUPS.find(m => m.num === num);
  const lPlayers = getPlayers(num, mu.left);
  const rPlayers = getPlayers(num, mu.right);
  const leftTotal  = lPlayers.length ? Number(lPlayers[0][C.UserTotal] || 0) : 0;
  const rightTotal = rPlayers.length ? Number(rPlayers[0][C.UserTotal] || 0) : 0;

  const lF = lPlayers.filter(r => r[C.Position]==='F');
  const lD = lPlayers.filter(r => r[C.Position]==='D');
  const lG = lPlayers.filter(r => r[C.Position]==='G');
  const rF = rPlayers.filter(r => r[C.Position]==='F');
  const rD = rPlayers.filter(r => r[C.Position]==='D');
  const rG = rPlayers.filter(r => r[C.Position]==='G');

  function pRow(lp, rp) {
    const lpts = lp ? Number(lp[C.TotalPoints]||0) : 0;
    const rpts = rp ? Number(rp[C.TotalPoints]||0) : 0;
    const li = lp ? indClass(lp[C.Indicator]) : 'ind-off';
    const ri = rp ? indClass(rp[C.Indicator]) : 'ind-off';
    return `<div class="player-row">
      <span class="ind ${li}"></span>
      <span class="pname">${lp?lp[C.Player]:''}</span>
      <span class="ppts-l${lpts>0?' scored':''}">${lpts}</span>
      <span class="divider-col"></span>
      <span class="ppts-r${rpts>0?' scored':''}">${rpts}</span>
      <span class="pname-r">${rp?rp[C.Player]:''}</span>
      <span class="ind ${ri}"></span>
    </div>`;
  }

  const maxF=Math.max(lF.length,rF.length);
  const maxD=Math.max(lD.length,rD.length);
  const maxG=Math.max(lG.length,rG.length);
  let fHtml='',dHtml='',gHtml='';
  for(let i=0;i<maxF;i++) fHtml+=pRow(lF[i],rF[i]);
  for(let i=0;i<maxD;i++) dHtml+=pRow(lD[i],rD[i]);
  for(let i=0;i<maxG;i++) gHtml+=pRow(lG[i],rG[i]);

  const preds = getPreds(num);
  const predPtsL = preds.length ? Number(preds[0][P.PredPtsLeft]||0) : 0;
  const predPtsR = preds.length ? Number(preds[0][P.PredPtsRight]||0) : 0;
  let predHtml = preds.map(r =>
    `<div class="pred-row"><span class="pred-l">${r[P.PredLeft]||''}</span><span class="pred-r">${r[P.PredRight]||''}</span></div>`
  ).join('');

  document.getElementById('detail-container').innerHTML = `
  <div class="detail-card">
    <div class="matchup-title-bar">MATCHUP ${num}</div>
    <div class="owners-row">
      <div class="own-l"><div class="own-l-name">${mu.left}</div><div class="own-l-pts">${leftTotal} pts</div></div>
      <div class="vs-mid">VS</div>
      <div class="own-r"><div class="own-r-name">${mu.right}</div><div class="own-r-pts">${rightTotal} pts</div></div>
    </div>
    <div class="section-bar">⚡ Attaquants</div>${fHtml}
    <div class="section-bar">🛡 Défenseurs</div>${dHtml}
    <div class="section-bar">🥅 Gardiens</div>${gHtml}
    <div class="points-bar">
      <div class="pts-l">Points joueurs<span>${leftTotal}</span></div>
      <div class="pts-r">Points joueurs<span>${rightTotal}</span></div>
    </div>
    <div class="pred-wrap">
      <div class="pred-title">Prédictions</div>${predHtml||'<div class="pred-row"><span class="pred-l" style="color:#8a9bb0">Aucune prédiction</span></div>'}
    </div>
    <div class="pred-pts-bar">
      <div class="pred-pts-l">Points prédictions<span>${predPtsL}</span></div>
      <div class="pred-pts-r">Points prédictions<span>${predPtsR}</span></div>
    </div>
    <div class="total-bar">
      <div class="total-l">Total<span>${leftTotal}</span></div>
      <div class="total-r">Total<span>${rightTotal}</span></div>
    </div>
  </div>`;

  document.getElementById('home-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  window.scrollTo(0,0);
}

function showHome() {
  document.getElementById('detail-view').style.display='none';
  document.getElementById('home-view').style.display='block';
  window.scrollTo(0,0);
}

loadData();
setInterval(loadData,300000);
</script>
</body>
</html>
